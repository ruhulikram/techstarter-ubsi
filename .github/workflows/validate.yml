name: Validate

on:
  push:
  pull_request:

jobs:
  manifests:
    name: Validate manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate package, profile, and semester manifests
        run: python tools/validate-manifest.py

  windows-installer:
    name: Validate Windows installer dry run
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer dry run
        shell: powershell
        run: .\install.ps1 -DryRun -NonInteractive
